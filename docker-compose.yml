services:
  mysql:
    image: mysql:8.4
    container_name: car_dekho_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: car_dekho
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./car_dekho_backend
      dockerfile: Dockerfile
    container_name: car_dekho_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: mysql://root:root@mysql:3306/car_dekho
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./car-dekho-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:5000/api/v1
    container_name: car_dekho_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
